# Allow consumers to use this repo as a pre-commit hook source:
#
#   - repo: https://github.com/gcfernando/pipewarden
#     rev: v1.0.0
#     hooks:
#       - id: pipewarden-secrets
#       - id: pipewarden-diff
#
- id: pipewarden-secrets
  name: pipewarden (secrets only)
  description: Scan staged files for committed secrets.
  entry: pipewarden --only secrets --no-color
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-commit, pre-push]

- id: pipewarden-diff
  name: pipewarden (changed files only)
  description: Fast pre-push check — scans files changed vs origin/main.
  entry: pipewarden --only secrets --diff origin/main --no-color
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-push]

- id: pipewarden-full
  name: pipewarden (full)
  description: Full local CI run. Slower; use sparingly.
  entry: pipewarden --no-color
  language: python
  pass_filenames: false
  always_run: true
  stages: [manual]
