# Runs the full quality gate on every push to main and on every pull request.
#
# The matrix covers all supported Python versions across the three major
# operating systems so regressions on any combination are caught before they
# reach production.
#
# How new Python releases are handled automatically:
#   "3.x" always resolves to the current latest stable Python 3 release at
#   workflow run time. When 3.15, 3.16, etc. ship, this job picks them up
#   with zero config changes. Only the minimum version (3.10) needs a manual
#   update if we ever raise the requires-python floor in pyproject.toml.

name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:

# Read-only checkout is all this workflow needs — nothing is pushed back.
permissions:
  contents: read

jobs:
  quality-gate:
    name: "Python ${{ matrix.python }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      # Allow all matrix legs to finish even if one fails so we get a full
      # picture of which OS/Python combinations are broken.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python:
            - "3.10"   # minimum supported — matches requires-python in pyproject.toml
            - "3.11"
            - "3.12"
            - "3.13"
            - "3.x"    # always the current latest stable release; no config change needed when a new version ships

    steps:
      # -----------------------------------------------------------------------
      # Checkout the commit that triggered the workflow
      # -----------------------------------------------------------------------
      - name: Check out source code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Install the exact Python version from the matrix.
      # We test 3.10 because that is our declared minimum in pyproject.toml.
      # "3.x" always resolves to the latest stable release at run time.
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # -----------------------------------------------------------------------
      # Install the package in editable mode with all dev dependencies.
      # The [dev] extra pulls in pytest, ruff, mypy, and pytest-cov.
      # -----------------------------------------------------------------------
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # -----------------------------------------------------------------------
      # Ruff catches style issues and common bugs in a single fast pass.
      # Failures here mean code was committed without running the linter locally.
      # -----------------------------------------------------------------------
      - name: Lint with ruff
        run: ruff check .

      # -----------------------------------------------------------------------
      # Mypy runs in strict mode (configured in pyproject.toml).
      # This ensures every public API has correct type annotations.
      # -----------------------------------------------------------------------
      - name: Type-check with mypy
        run: mypy

      # -----------------------------------------------------------------------
      # Run the full test suite with branch coverage.
      # pytest-cov enforces the 80 % floor defined in pyproject.toml —
      # the job fails if coverage drops below that threshold.
      # -----------------------------------------------------------------------
      - name: Run tests with coverage
        run: pytest --cov=pipewarden --cov-report=xml --junit-xml=junit.xml

      # -----------------------------------------------------------------------
      # Run pipewarden against its own repository (dog-fooding).
      # This verifies the CLI entry point works end-to-end after install and
      # that the tool can scan a real project without crashing.
      # vulns is skipped because we don't ship a lockfile in this repo.
      # -----------------------------------------------------------------------
      - name: Self-test — run pipewarden against this repository
        run: pipewarden --root . --skip vulns --junit-out self-junit.xml

      # -----------------------------------------------------------------------
      # Only upload the coverage report once (ubuntu + latest Python) to avoid
      # uploading identical artifacts from every matrix leg.
      # "3.x" automatically tracks the newest stable release so this condition
      # never needs updating when a new Python version ships.
      # -----------------------------------------------------------------------
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
